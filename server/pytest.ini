[pytest]
# Where the tests live. Anchors the root so `pytest` from either the
# repo root or server/ picks up the same set of tests.
testpaths = tests

# pytest-asyncio's "auto" mode means every `async def test_*` is
# automatically an async test. Without this, each test would need a
# `@pytest.mark.asyncio` decorator and forgetting one silently turns
# the test into a no-op (the coroutine is created but never awaited).
asyncio_mode = auto

# Make failure output readable — show locals at the failure frame and
# keep the short traceback so log noise doesn't drown the actual error.
addopts = -v --tb=short --strict-markers

# Warn us loudly if a test file defines a marker we didn't declare.
# This catches typos like `@pytest.mark.asycnio` (note the typo) that
# would otherwise silently produce "unknown marker" warnings.
markers =
    integration: tests that require external services (conduwuit, SMTP, LiveKit)
