<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0e11" />
    <!-- Concord launch buffer (INS-023): paint the dark theme
         background immediately so every platform (desktop, mobile,
         TV) avoids a white flash between document load and React
         hydration. The React-side <LaunchAnimation/> fades out on
         top of this once the app is ready. Kept inline so it
         applies before any stylesheet fetch completes. -->
    <style>
      html, body { background: #0c0e11; color: #f4f4f7; margin: 0; }
      html { color-scheme: dark; }
      body { min-height: 100vh; }
    </style>
    <!-- Tag <html> before first paint so CSS can branch on native vs. web.
         __TAURI__ is injected at document-start by withGlobalTauri. -->
    <script>if(window.__TAURI__)document.documentElement.classList.add('tauri')</script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon.png" />
    <title>Concord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
