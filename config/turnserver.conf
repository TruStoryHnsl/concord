# Concord — coturn TURN relay configuration
# This file is mounted read-only into the coturn container.
# Secrets are injected via CLI flags in docker-compose.yml.

# ── Listening ─────────────────────────────────────────────────────────
listening-port=3478

# NOTE: NAT / external-ip / allowed-peer-ip are operator-specific and
# get composed onto the turnserver CLI by config/coturn-entrypoint.sh
# from .env values (TURN_EXTERNAL_IP, TURN_ALLOWED_PEER_IPS, etc.).
# coturn does NOT substitute environment variables inside this config
# file — it reads it literally — so we keep deployment-variable
# settings out of here.

# ── Relay ports (media traffic) ───────────────────────────────────────
# See docs/voice/port-coherence.md for the four-file port contract.
# This range MUST stay disjoint from the LiveKit host range
# (docker-compose.yml livekit.ports[]). CI's config-lint job enforces
# the disjoint check on every PR.
min-port=49152
max-port=49252

# ── Authentication ────────────────────────────────────────────────────
# Long-term credentials via shared secret (RFC 5389).
# The actual secret is passed via --static-auth-secret in docker-compose
# so it never touches disk.
use-auth-secret

# ── Security hardening ────────────────────────────────────────────────
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Allow relaying to LiveKit's RTC ports on the host. LiveKit runs in
# `network_mode: host` (see docker-compose.yml comment for rationale),
# so it binds directly on the host's primary LAN interface — coturn
# must allow that IP as a peer or it will silently drop LiveKit's STUN
# binding requests. The host LAN IP is operator-specific; injected by
# coturn-entrypoint.sh as additional `--allowed-peer-ip` CLI flags
# from TURN_ALLOWED_PEER_IPS (comma-separated). 127.0.0.1 stays
# allowed for diagnostic / loopback paths (e.g. the CI integration
# smoke that probes coturn on localhost).
allowed-peer-ip=127.0.0.1

# ── Logging ───────────────────────────────────────────────────────────
log-file=stdout
no-stdout-log
