port: 7880
log_level: info
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true
  stun_servers:
    - stun.l.google.com:19302
    - stun1.l.google.com:19302
room:
  empty_timeout: 300         # close room 5 min after last participant leaves
  departure_timeout: 20      # grace period before marking participant as gone
turn:
  enabled: true
  udp_port: 3478
  tls_port: 0
  domain: ${LIVEKIT_TURN_DOMAIN:-concorrd.com}
